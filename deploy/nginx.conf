# Nginx config for recordtec-fe on GCP public subnet VM
# Serves the Vue app and proxies /api to the backend VM in the private subnet

server {
    listen 80;
    server_name _;  # Replace with your domain or leave as _ for default

    root /var/www/recordtec-fe;
    index index.html;

    # Serve static frontend (Vue SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend VM in private subnet
    # Replace 10.10.1.4 with your backend VM's private IP
    location /api/ {
        proxy_pass http://10.10.1.4:8000/;
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
