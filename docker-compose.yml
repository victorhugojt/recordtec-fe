services:
  frontend:
    build: .
    container_name: recordtec-frontend
    ports:
      - "8080:80"
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-127.0.0.1}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
    restart: unless-stopped

# Copy .env.example → .env and set BACKEND_HOST, or export before compose.
# Ansible: generate .env on the target host or pass -e BACKEND_HOST=...
